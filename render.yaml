# Render Blueprint - 后端一键部署配置
# 推送到 GitHub 后，在 Render Dashboard 选择 "Blueprint" 导入此仓库即可自动创建服务
services:
  - type: web
    name: ai-role-chat-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_PATH
        value: /tmp/database.sqlite
      - key: ZHIPU_MODEL
        value: glm-4v-flash
      - key: CORS_ORIGIN
        value: https://frontend-hp65hab76-qrx-joes-projects.vercel.app
      # 以下敏感变量必须在 Render Dashboard 手动添加（不要写在这里）：
      # - DEEPSEEK_API_KEY (必填)
      # - ZHIPU_API_KEY (可选，用于图片理解)
      # - MOCK_MODE (可选，设为 true 可在无 API Key 时演示)
